name: Feature request
description: Suggest a product or developer improvement for Orbit
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: What would you like Orbit to do?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Extra context
      description: Example workflows, screenshots, similar tools, or tradeoffs you care about.
